name: Actualizar versión PWA

on:
  push:
    branches: [ main ]

jobs:
  update-cache-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Actualizar CACHE_NAME y hacer commit
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)

          # Reemplaza cualquier versión existente (placeholder o timestamp anterior)
          sed -i "s/const CACHE_NAME *= *'rdcft-[^']*'/const CACHE_NAME = 'rdcft-$TIMESTAMP'/" service-worker.js

          echo "Cache version: rdcft-$TIMESTAMP"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add service-worker.js
          git diff --staged --quiet || git commit -m "auto: cache PWA $TIMESTAMP"
          git push
