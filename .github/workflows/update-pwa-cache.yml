name: Actualizar versión PWA

on:
  push:
    branches: [ main ]

jobs:
  update-cache-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Actualizar CACHE_NAME con timestamp
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          sed -i "s/{{CACHE_VERSION}}/$TIMESTAMP/g" service-worker.js
          echo "Cache version: rdcft-$TIMESTAMP"

      - name: Commit y push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add service-worker.js
          git diff --staged --quiet || git commit -m "auto: actualizar cache PWA $TIMESTAMP"
          git push
