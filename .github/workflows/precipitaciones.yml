name: Descargar Precipitaciones Arauco

on:
  # Cada lunes a las 00:30 hora Chile (UTC-4 = 04:30 UTC)
  schedule:
    - cron: '30 4 * * 1'

  # Ejecución manual para pruebas
  workflow_dispatch:

jobs:
  descargar:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necesario solo para el commit/push final

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias Python
        run: |
          pip install selenium webdriver-manager pandas openpyxl requests

      - name: Instalar Google Chrome
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb

      - name: Verificar Chrome instalado
        run: google-chrome --version

      - name: Ejecutar script de descarga
        run: python scripts/descargar_precipitaciones.py
        env:
          CI: true   # Activa modo headless en el script

      - name: Validar output generado
        run: |
          test -f data/precipitaciones.json || { echo "ERROR: precipitaciones.json no fue generado"; exit 1; }
          python3 -c "
          import json, sys
          try:
            d = json.load(open('data/precipitaciones.json'))
            assert d.get('estaciones'), 'Sin estaciones'
            assert d.get('por_paisaje'), 'Sin datos por paisaje'
            assert d.get('periodo'), 'Sin período'
            print(f'OK — Período: {d[\"periodo\"][\"inicio\"]} a {d[\"periodo\"][\"fin\"]}')
            print(f'OK — Estaciones: {len(d[\"estaciones\"])}')
            print(f'OK — Paisajes: {len(d[\"por_paisaje\"])}')
          except Exception as e:
            print(f'ERROR validando JSON: {e}')
            sys.exit(1)
          "

      - name: Commit y push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/precipitaciones.json
          git diff --staged --quiet || git commit -m "auto: precipitaciones $(date +'%Y-%m-%d')"
          git push